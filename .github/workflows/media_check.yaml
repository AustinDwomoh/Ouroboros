name: Media Sync

on:
  schedule:
    - cron: '0 * * * *'    # series — every hour
    - cron: '0 0 */12 * *' # movies — every 12 hours
  workflow_dispatch:         # manual trigger from GH UI

jobs:
  sync-series:
    if: github.event.schedule == '0 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run series sync
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/Ouroboros

            # Activate virtualenv
            source ouroboros/bin/activate

            # Install dependencies
            pip install -r requirements.txt

            # Run series sync
            python update_media.py --target series

      

  sync-movies:
    if: github.event.schedule == '0 0 */12 * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run movie sync
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/Ouroboros

            # Activate virtualenv
            source ouroboros/bin/activate

            # Install dependencies
            pip install -r requirements.txt

            # Run movie sync
            python update_media.py --target movies
