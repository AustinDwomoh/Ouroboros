name: Media Sync

on:
  schedule:
    - cron: '0 * * * *'    # series — every hour
    - cron: '0 0 */12 * *' # movies — every 12 hours
  workflow_dispatch:         # manual trigger from GH UI

jobs:
  sync-series:
    if: github.event.schedule == '0 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run series sync
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python sync.py --target series

  sync-movies:
    if: github.event.schedule == '0 0 */12 * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run movie sync
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python sync.py --target movies